<!DOCTYPE html>
<html>
<head>
    <title>Zari House - Contact</title>
    <link rel="icon" href="images/favicon.jpeg" />
    <link rel="stylesheet" href="wwwroot/lib/bootstrap/css/bootstrap.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="contact-page">

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg">
        <div class="container">
            <a class="navbar-brand">Zari House</a>
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                <li class="nav-item"><a class="nav-link" href="collection.html">Collection</a></li>
                <li class="nav-item"><a class="nav-link" href="about.html">About</a></li>
                <li class="nav-item"><a class="nav-link active" href="contact.html">Contact</a></li>
            </ul>
        </div>
    </nav>

    <!-- Contact Section -->
    <div class="container mt-5">
        <h2 class="section-title text-center">Contact Us</h2>
        <div class="row justify-content-center mt-4">
            <!-- Contact Info -->
            <div class="col-md-6 text-center mb-4">
                <p class="text-gold"><strong>Email:</strong> info@zarihouse.com</p>
                <p class="text-gold"><strong>Phone:</strong> +92 300 1234567</p>
            </div>
            <!-- Contact Form -->
            <div class="col-md-6">
                <form class="contact-form">
                    <div class="mb-3">
                        <input type="text" class="form-control" placeholder="Your Name" required>
                    </div>
                    <div class="mb-3">
                        <input type="email" class="form-control" placeholder="Your Email" required>
                    </div>
                    <div class="mb-3">
                        <textarea class="form-control" placeholder="Your Message" rows="5" required></textarea>
                    </div>
                    <button type="submit" class="btn btn-gold w-100">Send Message</button>
                </form>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="mt-5 text-center text-light">
        © 2026 Zari House – Luxury Fashion
    </footer>

    <!-- Bootstrap JS -->
    <script src="wwwroot/lib/bootstrap/js/bootstrap.bundle.min.js"></script>

    <!-- Page-specific styling -->
    <style>
        body.contact-page {
            background-color: #222222; 
        }

        .section-title {
            color: #d4af37; /* gold headings */
            font-weight: bold;
            margin-bottom: 30px;
        }

        .text-gold {
            color: #d4af37;
        }

        .contact-form input,
        .contact-form textarea {
            border-radius: 8px;
            border: none;
            padding: 10px;
            width: 100%;
            background-color: #2c2c3c;
            color: #f5e6cc;
        }

            .contact-form input::placeholder,
            .contact-form textarea::placeholder {
                color:floralwhite;
            }

        .contact-form button.btn-gold {
            background-color: #d4af37;
            color: black;
            border-radius: 8px;
            padding: 10px 20px;
            transition: background 0.3s;
        }

            .contact-form button.btn-gold:hover {
                background-color: #b8962e;
                color: white;
            }

        footer {
            color: #f5e6cc;
            font-size: 0.9rem;
        }
    </style>

</body>
</html>
