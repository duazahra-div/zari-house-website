<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zari House - Collection</title>
    <link rel="icon" href="images/favicon.jpeg" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="collection-page">

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg">
        <div class="container">
            <a class="navbar-brand">Zari House</a>
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                <li class="nav-item"><a class="nav-link active" href="collection.html">Collection</a></li>
                <li class="nav-item"><a class="nav-link" href="about.html">About</a></li>
                <li class="nav-item"><a class="nav-link" href="contact.html">Contact</a></li>
            </ul>
        </div>
    </nav>

    <!-- Collection Cards -->
    <div class="container mt-5">
        <h2 class="section-title text-center">Our Collection</h2>
        <div class="row g-4">
            <!-- Card 1 -->
            <div class="col-md-4">
                <div class="card collection-card text-center">
                    <img src="images/c1.jpeg" class="card-img-top collection-img" alt="Bridal Collection">
                    <div class="card-body">
                        <h5 class="card-title text-gold">Bridal Collection <span class="badge bg-danger">New</span></h5>
                        <p>Luxury handcrafted bridal designs.</p>
                        <button class="btn btn-gold">Buy</button>
                    </div>
                </div>
            </div>
            <!-- Card 2 -->
            <div class="col-md-4">
                <div class="card collection-card text-center">
                    <img src="images/c2.jpeg" class="card-img-top collection-img" alt="Party Collection">
                    <div class="card-body">
                        <h5 class="card-title text-gold">Party Collection</h5>
                        <p>Elegant evening party dresses.</p>
                        <button class="btn btn-gold">Buy</button>
                    </div>
                </div>
            </div>
            <!-- Card 3 -->
            <div class="col-md-4">
                <div class="card collection-card text-center">
                    <img src="images/c3.jpeg" class="card-img-top collection-img" alt="Luxury Zari">
                    <div class="card-body">
                        <h5 class="card-title text-gold">Luxury Zari</h5>
                        <p>Premium handmade designs.</p>
                        <button class="btn btn-gold">Buy</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Subscribe Form -->
    <div class="container mt-5">
        <h3 class="section-title text-center">Subscribe to Our Newsletter</h3>
        <div class="row justify-content-center mt-3">
            <div class="col-md-6">
                <form class="subscribe-form text-center">
                    <input type="email" class="form-control mb-3" placeholder="Enter your email" required>
                    <button class="btn btn-gold" type="submit">Subscribe</button>
                </form>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="mt-5 text-center text-light">
        © 2026 Zari House – Luxury Fashion
    </footer>

    <!-- Bootstrap JS -->
   <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>



</body>
</html>
